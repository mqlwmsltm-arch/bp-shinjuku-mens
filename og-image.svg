    <circle cx="19" cy="218" r="71" fill="#4338ca" opacity="0.17"/>
    <circle cx="1247" cy="285" r="92" fill="#4338ca" opacity="0.12"/>
    <circle cx="424" cy="42" r="37" fill="#4338ca" opacity="0.11"/>
    <circle cx="38" cy="-70" r="72" fill="#4338ca" opacity="0.19"/>
    <rect x="54" y="-99" width="26" height="61" rx="8" fill="#4f46e5" opacity="0.11" transform="rotate(11, 588, 185)"/>
    <rect x="949" y="630" width="78" height="68" rx="8" fill="#4f46e5" opacity="0.04" transform="rotate(8, 287, 297)"/>
    <rect x="44" y="-95" width="52" height="25" rx="8" fill="#4f46e5" opacity="0.08" transform="rotate(38, 77, 95)"/>
