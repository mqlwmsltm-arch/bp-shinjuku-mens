    <rect x="1174" y="669" width="96" height="69" rx="8" fill="#4f46e5" opacity="0.13" transform="rotate(36, 277, 231)"/>
    <rect x="915" y="502" width="22" height="36" rx="8" fill="#4f46e5" opacity="0.09" transform="rotate(18, 753, 316)"/>
    <rect x="1267" y="-70" width="86" height="63" rx="8" fill="#4f46e5" opacity="0.11" transform="rotate(38, 1067, 420)"/>
    <rect x="1142" y="449" width="74" height="27" rx="8" fill="#4f46e5" opacity="0.12" transform="rotate(2, 749, 687)"/>
    <polygon points="160,375 201,457 119,457" fill="#4338ca" opacity="0.12"/>
    <polygon points="817,8 868,110 766,110" fill="#4338ca" opacity="0.09"/>
    <polygon points="303,705 324,747 282,747" fill="#4338ca" opacity="0.05"/>
    <polygon points="60,611 110,711 10,711" fill="#4338ca" opacity="0.07"/>

  <!-- Wave at bottom -->
  <path d="M0,574 C360,602 840,546 1200,574 L1200,630 L0,630Z" fill="#4338ca" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
